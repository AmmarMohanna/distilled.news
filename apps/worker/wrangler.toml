name = "lownoise-news"
main = "src/index.ts"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "../web/dist"
binding = "ASSETS"
run_worker_first = true

[vars]
# Optional. If omitted, webhook registration uses the current Worker origin.
# PUBLIC_API_BASE_URL = "https://your-domain.example"
# PUBLIC_WEB_BASE_URL = "https://your-domain.example"
CLOUDFLARE_ACCOUNT_ID = ""
CLOUDFLARE_AI_GATEWAY_ID = "default"
OPENAI_MODEL = "gpt-4.1-mini"
OPENAI_EMBEDDING_MODEL = "text-embedding-3-small"

[[d1_databases]]
binding = "DB"
database_name = "lownoise"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "RAW_ARCHIVE"
bucket_name = "lownoise-raw"

[[queues.producers]]
binding = "PROCESSING_QUEUE"
queue = "lownoise-processing"

[[queues.consumers]]
queue = "lownoise-processing"
max_batch_size = 10
max_batch_timeout = 5

[triggers]
crons = ["*/3 * * * *"]

[[vectorize]]
binding = "VECTORIZE"
index_name = "lownoise-published"
